site_name: System Design Study Guides
site_description: Interview-focused notes on the core building blocks of large-scale systems.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search

# Self-hosted Mermaid (no CDN). Material's built-in integration lazy-loads
# Mermaid from unpkg, which fails on locked-down networks; this bundled copy
# renders diagrams offline. startOnLoad is true, so it auto-renders on load.
extra_javascript:
  - javascripts/mermaid.min.js

nav:
  - Home: index.md
  - Interview Playbook:
      - Attacking the Interview: interview-playbook/attacking-the-interview.md
      - Senior vs Staff Signals: interview-playbook/senior-vs-staff-signals.md
  - Quick Refresher:
      - 60-Minute Refresher: quick-refresher/60-minute-refresher.md
  - Foundations:
      - Networking & Request Path: foundations/networking-request-path.md
      - HTTP, SSE & WebSockets: foundations/http-and-realtime.md
      - Client → Edge/CDN: foundations/client-edge-cdn.md
  - Databases:
      - SQL vs NoSQL & ACID: databases/sql-vs-nosql-acid.md
      - Indexing: databases/indexing.md
      - Pagination: databases/pagination.md
      - Sharding & Partitioning: databases/sharding-partitioning.md
      - Blob Storage: databases/blob-storage.md
  - Distributed Systems:
      - "Consistency: CAP & PACELC": distributed-systems/consistency-cap-pacelc.md
      - Availability & Replication: distributed-systems/availability-replication.md
  - Caching & Scale:
      - Caching Patterns: caching-and-scale/caching-patterns.md
      - Traffic Estimation: caching-and-scale/traffic-estimation.md
  - Messaging & APIs:
      - Concurrency: messaging-and-apis/concurrency.md
      - Event-Driven Architecture & Messaging: messaging-and-apis/event-driven-and-messaging.md
      - GraphQL: messaging-and-apis/graphql.md
  - Resilience:
      - Stability Patterns: resilience/stability-patterns.md
  - Key Technologies:
      - Technology Selection Cheat Sheet: key-technologies/index.md
      - Datastores: key-technologies/datastores.md
      - Caching: key-technologies/caching.md
      - Messaging & Streaming: key-technologies/messaging-streaming.md
      - Search, Object Storage & CDN: key-technologies/search-storage-cdn.md
      - Coordination: key-technologies/coordination.md
  - Patterns:
      - Contention: patterns/contention.md
      - Multi-step Processes: patterns/multi-step-processes.md
      - Scaling Writes: patterns/scaling-writes.md
      - Scaling Reads: patterns/scaling-reads.md
      - Handling Large Blobs: patterns/large-blobs.md
      - Long-Running Tasks: patterns/long-running-tasks.md
  - Practice Questions:
      - Overview & Question Ladder: practice-questions/index.md
      - 1. URL Shortener (Bitly): practice-questions/url-shortener.md
      - 2. Pastebin: practice-questions/pastebin.md
      - 3. Rate Limiter: practice-questions/rate-limiter.md
      - 4. Web Crawler: practice-questions/web-crawler.md
      - 5. News Feed (Twitter): practice-questions/news-feed.md
      - 6. WhatsApp / Chat: practice-questions/whatsapp.md
      - 7. YouTube / Video Streaming: practice-questions/youtube.md
      - 8. Uber / Lyft: practice-questions/uber.md
      - 9. Google Drive / Dropbox: practice-questions/google-drive.md
      - 10. Ticketmaster: practice-questions/ticketmaster.md
